name: Connector Tests 
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          python -m pip install --user clang_format==11.0.1
          make format-check

  linux-tests-amd64:
    name: Linux Tests (amd64)
    runs-on: ubuntu-latest
    needs: format-check
    env:
      GEN: ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update -y -q -o=Dpkg::Use-Pty=0
          sudo apt-get install -y -q -o=Dpkg::Use-Pty=0 \
            ninja-build

      - name: Build and Test
        run: |
          make test

  windows-tests-amd64:
    name: Windows Tests (amd64)
    runs-on: windows-latest
    needs: linux-tests-amd64
    steps:
      - uses: actions/checkout@v6

      - name: Build and Test
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ../test
          cmake --build . --config Debug
          test_database_connector.exe

  macos-tests-aarch64:
    name: macOS Tests (aarch64)
    runs-on: macos-latest
    needs: linux-tests-amd64
    env:
      GEN: ninja
    steps:
      - uses: actions/checkout@v6

      - name: Build and Test
        run: |
          make test

  linux-threads-amd64:
    name: Linux Threads (amd64)
    runs-on: ubuntu-latest
    needs: linux-tests-amd64
    env:
      GEN: ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update -y -q -o=Dpkg::Use-Pty=0
          sudo apt-get install -y -q -o=Dpkg::Use-Pty=0 \
            ninja-build

      - name: Build and Test
        run: |
          make test_threads

  linux-ext-amd64:
    name: Linux Extension (amd64)
    runs-on: ubuntu-latest
    needs: linux-tests-amd64
    env:
      GEN: ninja
      CC: 'ccache gcc'
      CXX: 'ccache g++'
      CCACHE_DIR: ${{ github.workspace }}/ccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Engine
        uses: actions/checkout@v6
        with:
          path: 'duckdb'
          ref: 'main'
          repository: duckdb/duckdb

      - name: Dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update -y -q -o=Dpkg::Use-Pty=0
          sudo apt-get install -y -q -o=Dpkg::Use-Pty=0 \
            build-essential \
            ccache \
            cmake \
            ninja-build

      - name: Cache Key
        id: cache_key
        working-directory: duckdb
        run: |
          DUCKDB_VERSION=$(git rev-parse --short HEAD)
          KEY="${{ runner.os }}-${{ runner.arch }}-$DUCKDB_VERSION"
          echo "value=${KEY}" >> "${GITHUB_OUTPUT}"

      - name: Restore Cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/ccache
          key: ${{ steps.cache_key.outputs.value }}

      - name: Build Engine
        working-directory: duckdb
        run: |
          make release

      - name: Save Cache
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/ccache
          key: ${{ steps.cache_key.outputs.value }}

      - name: Build and Test Extension
        env:
          DUCKDB_SRC_PATH: ${{ github.workspace }}/duckdb
        run: |
          make test_ext
