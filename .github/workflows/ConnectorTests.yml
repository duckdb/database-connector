name: Connector Tests 
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python -m pip install --user clang_format==11.0.1
          make format-check

  linux-tests-amd64:
    name: Linux Tests (amd64)
    runs-on: ubuntu-latest
    needs: format-check
    env:
      GEN: ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update -y -q -o=Dpkg::Use-Pty=0
          sudo apt-get install -y -q -o=Dpkg::Use-Pty=0 \
            ninja-build

      - name: Build and Test
        run: |
          make test

  windows-tests-amd64:
    name: Windows Tests (amd64)
    runs-on: windows-latest
    needs: linux-tests-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ../test
          cmake --build . --config Debug
          test_database_connection.exe

  macos-tests-aarch64:
    name: macOS Tests (aarch64)
    runs-on: macos-latest
    needs: linux-tests-amd64
    env:
      GEN: ninja
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        run: |
          make test

  linux-threads-amd64:
    name: Linux Threads (amd64)
    runs-on: ubuntu-latest
    needs: linux-tests-amd64
    env:
      GEN: ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update -y -q -o=Dpkg::Use-Pty=0
          sudo apt-get install -y -q -o=Dpkg::Use-Pty=0 \
            ninja-build

      - name: Build and Test
        run: |
          make test_threads
